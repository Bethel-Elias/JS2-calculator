<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

        <title>Calculator</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <main>
            <section class="calculator" aria-label="Calculator">

                <output class="display" id="display" aria-live="polite">0</output>

                <section class="buttons" aria-label="Calculator controls">
                    <div class="row" aria-label="Calculator utility controls">
                        <button class="top-btn clear">AC</button>
                        <button class="top-btn backspace">⌫</button>
                        <button class="top-btn sign">+/-</button>
                        <button class="top-btn percent">%</button>
                    </div>

                    <section class="main-buttons">
                        <section class="numbers" aria-label="Number pad">

                            <div class="row">
                                <button class="number">7</button>
                                <button class="number">8</button>
                                <button class="number">9</button>
                            </div>

                            <div class="row">
                                <button class="number">4</button>
                                <button class="number">5</button>
                                <button class="number">6</button>
                            </div>

                            <div class="row">
                                <button class="number">1</button>
                                <button class="number">2</button>
                                <button class="number">3</button>
                            </div>

                            <div class="row">
                                <button class="number">0</button>
                                <button class="decimal">.</button>
                                <button class="equals">=</button>
                            </div>
                        </section>

                        <section class="operators" aria-label="Operators">

                            <button class="operator">/</button>
                            <button class="operator">*</button>
                            <button class="operator">-</button>
                            <button class="operator">+</button>

                        </section>

                    </section>

                </section>
            </section>
        </main>


        <script src="./js2/script.js"></script>
    </body>

</html>
